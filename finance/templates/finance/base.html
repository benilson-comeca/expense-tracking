<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>expense-tracking</title>

    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            background:
                linear-gradient(rgba(79,70,229,0.6), rgba(213, 217, 224, 0.6)),
                url("{% static '.jpg' %}");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height: 100vh;
        }

        .container-box {
            background: white; 
            margin: 25px;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: url("{% static 'k.jpg' %}");
            background-size: cover;
            opacity: 0.9;
        }

        .card-custom {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }

        .chart-container {
            width: 100px;
            height: 10px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 0px;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

<div class="container-box">
    {% block content %}
    {% endblock %}
</div>

{% block scripts %}
{% endblock %}

</body>
</html>
