{% extends 'finance/base.html' %}

{% block title %}Добавить расход{% endblock %}

{% block content %}

<div class="card">
    <h2 style="text-align:center;">Добавить расход</h2>

    <form method="post">
        {% csrf_token %}

        <!-- Categoria -->
        <div class="form-group">
            <label>Категория:</label> 
           {{ form.category }}
        </div>

        <!-- Valor -->
        <div class="form-group">
            <label>Сумма (₽):</label>
            {{ form.amount }}
        </div>

        <!-- Data -->
        <div class="form-group">
            <label>Дата:</label>
            {{ form.date }}
        </div>

        <!-- Descrição -->
        <div class="form-group">
            <label>Описание:</label>
            {{ form.description }}
        </div>

        <button type="submit" class="btn-save">Сохранить</button>
    </form>

    <a href="/" class="btn-back">← Назад</a>
</div>

<style>
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.btn-save {
    width: 100%;
    padding: 10px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

.btn-save:hover {
    background: #2980b9;
}

.btn-back {
    display: block;
    text-align: center;
    margin-top: 15px;
    text-decoration: none;
    color: #555;
}
</style>

{% endblock %}
