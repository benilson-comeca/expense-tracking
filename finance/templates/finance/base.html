<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>expense-tracking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            min-height: 100vh;
        }

        .container-box {
            background: white; 
            margin: 40px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .card-custom {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }

        /* 🔥 TAMANHO DO GRÁFICO AQUI */
        .chart-container {
            width: 60px;
            height: 60px;
            margin: 0 auto;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

<div class="container-box">
    {% block content %}
    {% endblock %}
</div>

{% block scripts %}
{% endblock %}

</body>
</html>
